version: "3.8"

services:

  web:
    image: php:8.2-apache
    container_name: catalogo_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: catalogo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalogo
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./catalogo.sql:/docker-entrypoint-initdb.d/catalogo.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: catalogo_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: